<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Console — userland.run</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- JetBrains Mono everywhere — terminal grid, wordmark, and all chrome labels.
         Loaded at the document level so it's available inside the shadow root. -->
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Page shell (these live here, not in ui.css, so the component's stylesheet
         stays fully scoped to its shadow root). The terminal frames as a floating,
         rounded window on the desk — the 14px padding is the desk margin. */
      html, body { margin: 0; height: 100%; background: #0e0e10; }
      nano-terminal { display: block; height: 100vh; padding: 14px; box-sizing: border-box; }
    </style>
  </head>
  <body>
    <!-- The terminal is a web component with its own shadow root. Standalone uses
         all features (the createTerminal defaults); embedders compose via the
         <nano-terminal> attributes or its `config` property. -->
    <script type="module">
      import { defineNanoTerminal } from "/src/web-component.ts";
      defineNanoTerminal();
      // TEMP (HF production-path verify): engine only — model/tokenizer URLs
      // fall through to the userland-run Hugging Face defaults.
      const el = document.createElement("nano-terminal");
      el.config = { assistant: { local: { engine: "ornith" } } };
      document.body.appendChild(el);
    </script>
  </body>
</html>
