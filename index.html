<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Console — userland.run</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- JetBrains Mono everywhere — terminal grid, wordmark, and all chrome labels. -->
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <button id="sidebar-toggle" class="icon-btn" title="Toggle sidebar (⌘B)" aria-label="Toggle sidebar">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="15" rx="2.2"></rect><line x1="9" y1="4.5" x2="9" y2="19.5"></line></svg>
        </button>
        <div class="brand">userland<span class="dot">.run</span></div>
        <div class="spacer"></div>
        <div class="badge">NanoVM</div>
        <div class="actions">
          <button class="icon-btn" id="act-clear" title="Clear screen" aria-label="Clear screen">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6.5 L19 6.5"></path><path d="M9.5 6.5 L9.5 4.5 L14.5 4.5 L14.5 6.5"></path><path d="M7 6.5 L7.7 19.5 L16.3 19.5 L17 6.5"></path><path d="M10 10 L10 16 M14 10 L14 16"></path></svg>
          </button>
          <button class="icon-btn" id="act-restart" title="Restart VM" aria-label="Restart VM">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M19 11 A7.5 7.5 0 1 0 19.6 14.6"></path><path d="M14.6 8.4 L19.4 8.4 L19.4 13"></path></svg>
          </button>
          <button class="icon-btn" id="act-settings" title="Settings" aria-label="Settings">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="5" cy="12" r="1.7"></circle><circle cx="12" cy="12" r="1.7"></circle><circle cx="19" cy="12" r="1.7"></circle></svg>
          </button>
        </div>
      </header>

      <aside id="sidebar">
        <nav class="activity-bar" aria-label="Views">
          <button class="activity-btn" data-view="files" title="Files" aria-label="Files">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 6.5 H9.5 L11.5 9 H20.5 V18.5 H3.5 Z"></path></svg>
          </button>
          <button class="activity-btn" data-view="catalog" title="Catalog" aria-label="Catalog">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="7" height="7" rx="1.4"></rect><rect x="13" y="4" width="7" height="7" rx="1.4"></rect><rect x="4" y="13" width="7" height="7" rx="1.4"></rect><rect x="13" y="13" width="7" height="7" rx="1.4"></rect></svg>
          </button>
          <button class="activity-btn" data-view="sessions" title="Sessions" aria-label="Sessions">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="14" rx="2.5"></rect><path d="M7.5 10 L10.2 12.5 L7.5 15"></path><path d="M12.5 15 L16.5 15"></path></svg>
          </button>
        </nav>
        <div class="sidebar-views">
          <section class="panel" id="panel-files" data-view="files">
            <div class="panel-head">
              <span class="panel-label">Files</span>
              <span class="panel-hint" id="cwd">/</span>
            </div>
            <div class="panel-body">
              <div id="files" class="muted-note">Live file tree — coming in a later phase.</div>
            </div>
          </section>
          <section class="panel" id="panel-catalog" data-view="catalog">
            <div class="panel-head">
              <span class="panel-label">Catalog</span>
              <span class="panel-hint" id="catalog-hint"></span>
            </div>
            <div class="panel-body">
              <input id="catalog-filter" class="catalog-filter" type="text" placeholder="Search apps…" autocomplete="off" spellcheck="false" />
              <div id="catalog" class="catalog-list"><div class="muted-note">loading catalog…</div></div>
            </div>
          </section>
          <section class="panel" id="panel-sessions" data-view="sessions">
            <div class="panel-head">
              <span class="panel-label">Sessions</span>
            </div>
            <div class="panel-body">
              <ul id="sessions" class="list">
                <li class="session-row active">
                  <svg class="session-ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="14" rx="2.5"></rect><path d="M7.5 10 L10.2 12.5 L7.5 15"></path><path d="M12.5 15 L16.5 15"></path></svg>
                  <div class="session-meta">
                    <div class="session-name">sh</div>
                    <div class="session-cwd" id="session-state">booting…</div>
                  </div>
                </li>
              </ul>
            </div>
          </section>
        </div>
      </aside>

      <main id="terminal-area">
        <div class="tabstrip" id="tabstrip" role="tablist">
          <button class="tab active" data-tab="terminal" role="tab" aria-selected="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="14" rx="2.5"></rect><path d="M7.5 10 L10.2 12.5 L7.5 15"></path><path d="M12.5 15 L16.5 15"></path></svg>
            <span>Terminal</span>
          </button>
          <button class="tab" data-tab="editor" role="tab" aria-selected="false" hidden>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 7 L5 12 L9 17 M15 7 L19 12 L15 17"></path></svg>
            <span class="tab-label">Editor</span>
            <span class="tab-close" data-close="editor" title="Close" aria-label="Close editor">×</span>
          </button>
          <button class="tab" data-tab="preview" role="tab" aria-selected="false" hidden>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"></circle><path d="M3.5 12 H20.5 M12 3.5 C14.5 6 14.5 18 12 20.5 C9.5 18 9.5 6 12 3.5"></path></svg>
            <span>Preview</span>
          </button>
        </div>
        <div class="tab-host">
          <div class="tab-pane active" data-tab="terminal" id="term-pane"><canvas id="screen"></canvas></div>
          <div class="tab-pane" data-tab="editor" id="editor-host"></div>
          <div class="tab-pane" data-tab="preview" id="preview-host"></div>
        </div>
      </main>

      <footer id="footer">
        <span class="stat run" id="stat-cwd">/</span>
        <span class="sep">·</span>
        <span class="stat" id="stat-grid">—</span>
        <span class="sep">·</span>
        <span class="stat"><span class="lbl">up</span> <span id="stat-uptime">00:00:00</span></span>
        <span class="sep">·</span>
        <span class="stat" id="stat-ips" title="guest instructions per second">— <span class="lbl">ips</span></span>
        <span class="sep">·</span>
        <span class="stat status"><span class="dot"></span><span id="stat-status">booting</span></span>
        <span class="sep port-sep" id="stat-port-sep" hidden>·</span>
        <span class="stat port" id="stat-port" title="a server is listening" hidden></span>
        <div class="spacer"></div>
        <span class="stat">RV64GC</span>
        <span class="sep">·</span>
        <span class="stat" id="stat-cursor">ln 1:1</span>
      </footer>

      <!-- Settings popover (anchored under the ⚙ action; hidden until invoked). -->
      <div id="settings-popover" hidden role="menu" aria-label="Settings">
        <div class="settings-label">Session</div>
        <button class="settings-row" id="set-clear">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--icon)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6.5 L19 6.5 M9.5 6.5 L9.5 4.5 L14.5 4.5 L14.5 6.5 M7 6.5 L7.7 19.5 L16.3 19.5 L17 6.5"></path></svg>
          Clear scrollback
        </button>
        <button class="settings-row" id="set-restart">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--icon)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M19 11 A7.5 7.5 0 1 0 19.6 14.6 M14.6 8.4 L19.4 8.4 L19.4 13"></path></svg>
          Restart VM
        </button>
        <button class="settings-row" id="set-palette">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="15" rx="2.5"></rect><path d="M7.5 9.5 L10.5 12.5 L7.5 15.5"></path><path d="M12.5 15.5 L16.5 15.5"></path></svg>
          Command palette<kbd>⌘K</kbd>
        </button>
        <div class="settings-div"></div>
        <div class="settings-note">RV64GC · github.com/userland-run/nano</div>
      </div>
    </div>

    <!-- Cmd-K command palette (hidden until invoked). -->
    <div id="palette-overlay" hidden>
      <div id="palette" role="dialog" aria-label="Command palette">
        <input id="palette-input" type="text" placeholder="Type a command…" autocomplete="off" spellcheck="false" />
        <ul id="palette-list"></ul>
      </div>
    </div>

    <script type="module">
      import { createTerminal } from "/src/main.ts";
      // Standalone bootstrap: all features on (the createTerminal defaults).
      // Embedders import createTerminal and pass a TerminalConfig to compose.
      createTerminal("#app").then((t) => { window.__terminal = t; });
    </script>
  </body>
</html>
