<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Console — userland.run</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- JetBrains Mono = terminal grid; IBM Plex Sans = chrome (labels/sidebar). -->
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <div class="brand">userland<span class="dot">.run</span><span class="sep">·</span><span class="app">Console</span></div>
        <button id="sidebar-toggle" class="ghost-btn" title="Toggle sidebar (⌘B)" aria-label="Toggle sidebar">☰</button>
        <div class="spacer"></div>
        <button class="hints" id="palette-open" title="Command palette (⌘K)"><kbd>⌘K</kbd> palette</button>
      </header>

      <aside id="sidebar">
        <section class="panel">
          <div class="panel-label">Sessions</div>
          <ul id="sessions" class="list">
            <li class="row active"><span class="dotmark"></span>sh<span class="row-meta" id="session-state">booting…</span></li>
          </ul>
        </section>
        <section class="panel">
          <div class="panel-label">Files</div>
          <div id="files" class="muted-note">cwd <code id="cwd">/</code></div>
        </section>
      </aside>

      <main id="terminal-area">
        <canvas id="screen"></canvas>
      </main>

      <footer id="footer">
        <span class="stat" id="stat-grid">—</span>
        <span class="stat" id="stat-cursor">—</span>
        <div class="spacer"></div>
        <span class="stat" id="stat-renderer">—</span>
        <span class="stat run" id="stat-status">·</span>
      </footer>
    </div>

    <!-- Cmd-K command palette (hidden until invoked). -->
    <div id="palette-overlay" hidden>
      <div id="palette" role="dialog" aria-label="Command palette">
        <input id="palette-input" type="text" placeholder="Type a command…" autocomplete="off" spellcheck="false" />
        <ul id="palette-list"></ul>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
